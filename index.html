<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقة حروف - النسخة النهائية</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0b1120;
            --accent: #38bdf8;
            --team-red: #ef4444;
            --team-blue: #3b82f6;
            --hex-w: 85px; 
            --hex-h: 95px;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: #1e293b; border-left: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; z-index: 10; overflow-y: auto; }
        .game-area { flex-grow: 1; position: relative; background: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .hex-grid { position: relative; width: 650px; height: 550px; }

        .hexagon {
            position: absolute;
            width: var(--hex-w);
            height: var(--hex-h);
            background-color: #334155;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.6rem; font-weight: bold; color: var(--accent);
            transition: 0.3s;
        }

        .hex-target { cursor: default; filter: opacity(0.8); }
        .hex-target.red { background-color: var(--team-red); color: white; }
        .hex-target.blue { background-color: var(--team-blue); color: white; }

        .hexagon:not(.hex-target):hover { filter: brightness(1.4); transform: scale(1.05); z-index: 10; }
        .hexagon.active-red { background-color: var(--team-red) !important; color: white !important; }
        .hexagon.active-blue { background-color: var(--team-blue) !important; color: white !important; }
        .hexagon.selected { outline: 3px solid white; z-index: 20; background-color: #475569; }

        .control-panel { background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        .q-box { min-height: 100px; font-size: 1.1rem; line-height: 1.5; }
        .a-box { color: #10b981; font-weight: bold; display: none; margin-top: 10px; border-top: 1px dotted #334155; padding-top: 10px; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-ans { background: var(--accent); color: black; }
        .btn-skip { background: #475569; color: white; }
        .btn-red { background: var(--team-red); color: white; }
        .btn-blue { background: var(--team-blue); color: white; }

        /* الشعار */
        .fixed-logo-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; pointer-events: none; }
        .fixed-logo-container img { width: 100px; height: auto; filter: drop-shadow(0px 0px 5px rgba(0,0,0,0.5)); }

        @media (max-width: 800px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-left: none; border-bottom: 2px solid var(--accent); }
            .game-area { height: 600px; }
            .hex-grid { transform: scale(0.7); }
            :root { --hex-w: 75px; --hex-h: 85px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="text-align: center; color: var(--accent);">لوحة التحكم</h2>
        <div class="control-panel">
            <div id="current-info" style="font-weight: bold; color: var(--accent); margin-bottom: 10px;">اختر حرفاً...</div>
            <div id="question-text" class="q-box">اضغط على حرف لبدء المسابقة.</div>
            <div id="answer-text" class="a-box">الإجابة: <span id="actual-answer"></span></div>
        </div>
        <button class="btn-ans" onclick="toggleAnswer()">إظهار / إخفاء الإجابة</button>
        <button class="btn-skip" onclick="changeQuestion()">سؤال آخر لنفس الحرف</button>
        <hr style="border: 0.5px solid #334155; margin: 10px 0;">
        <button class="btn-red" onclick="mark('red')">احتساب للأحمر</button>
        <button class="btn-blue" onclick="mark('blue')">احتساب للأزرق</button>
        <button style="background: #22c55e; color: white; margin-top: 10px;" onclick="declareWinnerManually()">إعلان الفائز النهائي</button>
    </div>

    <div class="game-area">
        <div class="hex-grid" id="grid"></div>
    </div>

    <div class="fixed-logo-container">
        <img src="https://raw.githubusercontent.com/H-A09/Letters-competition-/refs/heads/main/My%20Logo.svg" alt="Logo">
    </div>

    <script>
        const questionsBank = {
            "أ": [{q: "أول الخلفاء الراشدين؟", a: "أبو بكر الصديق"}, {q: "أكبر قارة في العالم؟", a: "آسيا"}, {q: "أصغر قارة في العالم؟", a: "أستراليا"}, {q: "عاصمة إثيوبيا؟", a: "أديس أبابا"}, {q: "حيوان يلقب بملك الغابة؟", a: "أسد"}],
            "ب": [{q: "دولة خليجية عاصمتها المنامة؟", a: "بحرين"}, {q: "عاصمة العراق؟", a: "بغداد"}, {q: "حيوان يلقب بسفينة الصحراء؟", a: "بعير"}, {q: "فاكهة يحبها القرد؟", a: "بنان"}, {q: "أكبر بحيرة مغلقة في العالم؟", a: "بحر قزوين"}],
            "ت": [{q: "دولة أفريقية عاصمتها تونس؟", a: "تونس"}, {q: "حيوان زاحف ضخم يعيش في الماء والبر؟", a: "تمساح"}, {q: "فاكهة رمضانية مجففة؟", a: "تمر"}, {q: "عاصمة ألبانيا؟", a: "تيرانا"}, {q: "رياضة تستخدم فيها المضرب والكرة الصغيرة؟", a: "تنس"}],
            "ث": [{q: "حيوان يلقب بالمكار؟", a: "ثعلب"}, {q: "الرقم الذي يأتي بعد اثنين؟", a: "ثلاثة"}, {q: "وصف للمال الكثير أو الشخص الغني؟", a: "ثراء"}, {q: "ثقب صغير في الجدار؟", a: "ثغرة"}, {q: "وصف للمعدن الغالي؟", a: "ثمين"}],
            "ج": [{q: "أكبر دولة عربية مساحة؟", a: "جزائر"}, {q: "حيوان يلقب بسفينة الصحراء؟", a: "جمل"}, {q: "عاصمة إندونيسيا؟", a: "جاكرتا"}, {q: "عاصمة جيبوتي؟", a: "جيبوتي"}, {q: "العلم الذي يدرس طبقات الأرض؟", a: "جيولوجيا"}],
            "ح": [{q: "مدينة سورية تلقب بالشهباء؟", a: "حلب"}, {q: "أنثى الحصان؟", a: "حجر"}, {q: "حيوان يغير لونه حسب البيئة؟", a: "حرباء"}, {q: "ضد كلمة بارد؟", a: "حار"}, {q: "طائر يضرب به المثل في السلام؟", a: "حمام"}],
            "خ": [{q: "دولة عاصمتها الخرطوم؟", a: "خرطوم (سودان)"}, {q: "مادة يصنع منها الفخار؟", a: "خزف"}, {q: "بيت النحل؟", a: "خلية"}, {q: "عكس كلمة دخول؟", a: "خروج"}, {q: "حيوان سريع جداً من الفصيلة الخيلية؟", a: "خيل"}],
            "د": [{q: "عاصمة دولة قطر؟", a: "دوحة"}, {q: "عاصمة سوريا? ", a: "دمشق"}, {q: "حيوان ذكي يعيش في الماء؟", a: "دلفين"}, {q: "عملة دولة الكويت؟", a: "دينار"}, {q: "طائر منزلي يضع البيض؟", a: "دجاجة"}],
            "ر": [{q: "عاصمة المملكة العربية السعودية؟", a: "رياض"}, {q: "شهر الصيام عند المسلمين؟", a: "رمضان"}, {q: "عاصمة المغرب؟", a: "رباط"}, {q: "عاصمة إيطاليا؟", a: "روما"}, {q: "نبات عطري مشهور؟", a: "ريحان"}],
            "ز": [{q: "كوكب يحيط به حلقات؟", a: "زحل"}, {q: "حيوان طويل الرقبة؟", a: "زرافة"}, {q: "أحد أركان الإسلام الخمسة؟", a: "زكاة"}, {q: "حجر كريم أخضر اللون؟", a: "زمرد"}, {q: "بئر ماء مشهور في مكة؟", a: "زمزم"}],
            "س": [{q: "عاصمة السودان؟", a: "سودان"}, {q: "عاصمة كوريا الجنوبية؟", a: "سول"}, {q: "سلاح قديم حاد؟", a: "سيف"}, {q: "أداة نستخدمها للتسلق؟", a: "سلم"}, {q: "حيوان زاحف بطيء له صدفة؟", a: "سلحفاة"}],
            "ش": [{q: "أقرب نجم للأرض؟", a: "شمس"}, {q: "بيت العنكبوت؟", a: "شبكة"}, {q: "الشخص الذي يكتب القصائد؟", a: "شاعر"}, {q: "نبات صحراوي له أشواك؟", a: "شوك"}, {q: "فصل تنخفض فيه الحرارة؟", a: "شتاء"}],
            "ص": [{q: "عاصمة اليمن؟", a: "صنعاء"}, {q: "طائر حر يستخدم في الصيد؟", a: "صقر"}, {q: "عاصمة بلغاريا؟", a: "صوفيا"}, {q: "أحد أركان الإسلام؟", a: "صيام"}, {q: "وصف للشخص الكثير الصدق؟", a: "صديق"}],
            "ض": [{q: "حيوان يعيش في الصحراء؟", a: "ضب"}, {q: "اللغة العربية لغة الـ؟", a: "ضاد"}, {q: "عضو في الفم للمضغ؟", a: "ضرس"}, {q: "الزائر الذي ينزل عندك؟", a: "ضيف"}, {q: "عكس كلمة نحيف؟", a: "ضخم"}],
            "ط": [{q: "عاصمة اليابان؟", a: "طوكيو"}, {q: "وسيلة نقل جوية؟", a: "طائرة"}, {q: "يعالج المرضى؟", a: "طبيب"}, {q: "عاصمة ليبيا؟", a: "طرابلس"}, {q: "طائر ذو ريش ملون؟", a: "طاووس"}],
            "ظ": [{q: "حيوان بري سريع؟", a: "ظبي"}, {q: "وقت منتصف النهار؟", a: "ظهيرة"}, {q: "عكس عدل؟", a: "ظلم"}, {q: "جزء صلب بالإصبع؟", a: "ظفر"}, {q: "الشخص العطشان؟", a: "ظمآن"}],
            "ع": [{q: "عاصمة عمان؟", a: "عمان"}, {q: "عضو الرؤية؟", a: "عين"}, {q: "يصنعه النحل؟", a: "عسل"}, {q: "بيت العصفور؟", a: "عش"}, {q: "طائر من الجوارح؟", a: "عقاب"}],
            "غ": [{q: "دولة عاصمتها أكرا؟", a: "غانا"}, {q: "طائر أسود؟", a: "غراب"}, {q: "رحيل الشمس مساءً؟", a: "غروب"}, {q: "حيوان رشيق؟", a: "غزال"}, {q: "مكان كثيف الأشجار؟", a: "غابة"}],
            "ف": [{q: "عاصمتها القدس؟", a: "فلسطين"}, {q: "أكبر حيوان بري؟", a: "فيل"}, {q: "دراسة الطاقة والمادة؟", a: "فيزياء"}, {q: "فاكهة حمراء؟", a: "فراولة"}, {q: "حيوان مفترس سريع؟", a: "فهد"}],
            "ق": [{q: "عاصمة مصر؟", a: "قاهرة"}, {q: "عاصمتها الدوحة؟", a: "قطر"}, {q: "للكتابة؟", a: "قلم"}, {q: "يظهر ليلاً؟", a: "قمر"}, {q: "حيوان أليف؟", a: "قطة"}],
            "ك": [{q: "دولة عاصمتها الكويت؟", a: "كويت"}, {q: "عاصمة ماليزيا؟", a: "كوالالمبور"}, {q: "حيوان يقفز؟", a: "كنغر"}, {q: "تفاعلات العناصر؟", a: "كيمياء"}, {q: "دولة في أمريكا الشمالية؟", a: "كندا"}],
            "ل": [{q: "عاصمتها بيروت؟", a: "لبنان"}, {q: "فاكهة حامضة؟", a: "ليمون"}, {q: "عضو التذوق؟", a: "لسان"}, {q: "عاصمة بريطانيا؟", a: "لندن"}, {q: "حجر كريم أبيض؟", a: "لؤلؤ"}],
            "م": [{q: "أول عاصمة في الإسلام؟", a: "مدينة منورة"}, {q: "عاصمة عمان؟", a: "مسقط"}, {q: "عاصمة روسيا؟", a: "موسكو"}, {q: "الكوكب الأحمر؟", a: "مريخ"}, {q: "نرى بها أنفسنا؟", a: "مرآة"}],
            "ن": [{q: "أطول نهر؟", a: "نيل"}, {q: "عاصمة موريتانيا؟", a: "نواكشوط"}, {q: "حيوان مخطط؟", a: "نمر"}, {q: "رمز النيتروجين؟", a: "نيتروجين"}, {q: "حشرة منظمة؟", a: "نملة"}],
            "ه": [{q: "عاصمتها نيودلهي؟", a: "هند"}, {q: "قمر بداية الشهر؟", a: "هلال"}, {q: "أرض مرتفعة؟", a: "هضبة"}, {q: "صوت الحمام؟", a: "هديل"}, {q: "بناء وآلات؟", a: "هندسة"}],
            "و": [{q: "عاصمتها واشنطن؟", a: "واشنطن"}, {q: "عاصمتها وارسو؟", a: "وارسو"}, {q: "تسقط في الخريف؟", a: "ورقة"}, {q: "ينقل الدم للقلب؟", a: "وريد"}, {q: "وحدة قياس الكهرباء؟", a: "واط"}],
            "ي": [{q: "عاصمتها طوكيو؟", a: "يابان"}, {q: "عاصمتها صنعاء؟", a: "يمن"}, {q: "عملة اليابان؟", a: "ين"}, {q: "عاصمة أرمينيا؟", a: "يريفان"}, {q: "نستخدمها للإمساك؟", a: "يد"}]
        };

        let selectedHex = null;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ""; // تنظيف الشبكة
            const lettersKeys = Object.keys(questionsBank);
            const shuffledLetters = lettersKeys.sort(() => 0.5 - Math.random()).slice(0, 25);

            for (let r = 0; r < 7; r++) {
                for (let c = 0; c < 7; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hexagon';
                    
                    // حسابات التموضع المتجاوب
                    let x = c * 88 + (r % 2 !== 0 ? 44 : 0);
                    let y = r * 74;
                    hex.style.left = x + 'px';
                    hex.style.top = y + 'px';

                    if (r === 0 || r === 6) { 
                        hex.classList.add('hex-target', 'red');
                    } else if (c === 0 || c === 6) { 
                        hex.classList.add('hex-target', 'blue');
                    } else {
                        const letterIndex = (r-1) * 5 + (c-1);
                        const char = shuffledLetters[letterIndex];
                        hex.innerText = char;
                        hex.onclick = () => {
                            if(selectedHex) selectedHex.classList.remove('selected');
                            selectedHex = hex;
                            hex.classList.add('selected');
                            document.getElementById('current-info').innerText = "الحرف المختار: " + char;
                            loadQuestion(char);
                        };
                    }
                    grid.appendChild(hex);
                }
            }
        }

        function loadQuestion(char) {
            const list = questionsBank[char] || [{q: "سؤال قيد التحديث...", a: "-"}];
            const qData = list[Math.floor(Math.random() * list.length)];
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('actual-answer').innerText = qData.a;
            document.getElementById('answer-text').style.display = 'none';
        }

        function toggleAnswer() {
            const box = document.getElementById('answer-text');
            box.style.display = (box.style.display === 'none') ? 'block' : 'none';
        }

        function changeQuestion() {
            if(selectedHex && selectedHex.innerText) loadQuestion(selectedHex.innerText);
        }

        function mark(team) {
            if(selectedHex) {
                selectedHex.className = 'hexagon active-' + team;
                
                // احتفال صغير عند كل حرف
                confetti({
                    particleCount: 80, spread: 60, origin: { y: 0.7 },
                    colors: team === 'red' ? ['#ef4444', '#ffffff'] : ['#3b82f6', '#ffffff']
                });

                selectedHex = null;
                document.getElementById('question-text').innerText = "رائع! اختر حرفاً آخر.";
                document.getElementById('answer-text').style.display = 'none';
                document.getElementById('current-info').innerText = "اختر حرفاً...";
            }
        }

        function declareWinnerManually() {
            const team = prompt("من الفائز؟ اكتب (أحمر) أو (أزرق)");
            if(team === "أحمر") {
                alert("مبروك للفريق الأحمر!");
                confetti({ particleCount: 500, spread: 160, origin: { y: 0.6 } });
            } else if(team === "أزرق") {
                alert("مبروك للفريق الأزرق!");
                confetti({ particleCount: 500, spread: 160, origin: { y: 0.6 } });
            }
        }

        init();
    </script>
</body>
</html>
